# NestBrain Configuration
# See DEVELOPMENT_CONTRACT.md for full documentation

wiki:
  name: "My Knowledge Base"
  path: "./data/wiki"
  raw_path: "./data/raw"

llm:
  # Provider: claude-cli (default, uses Claude Max via CLI) | openai | ollama
  provider: "claude-cli"
  model: "sonnet"
  max_turns: 5
  # api_key: env:OPENAI_API_KEY    # uncomment for OpenAI fallback

embeddings:
  model: "Xenova/all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 50

search:
  semantic_top_k: 10
  fulltext_enabled: true

server:
  port: 3000
  host: "localhost"
