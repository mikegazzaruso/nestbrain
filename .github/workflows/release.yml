name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs of the same workflow on the same branch when a new
# commit is pushed — avoids piling up concurrent release builds.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    name: Build macOS arm64
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-arm64-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            electron-mac-arm64-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prune non-arm64 node-pty prebuilds
        # node-pty ships prebuilds for all platforms inside one npm package.
        # With hardenedRuntime, codesign signs every mach-O individually and
        # chokes on Windows PE files, retrying for minutes. Strip everything
        # except the darwin-arm64 prebuild we actually need.
        run: |
          cd apps/desktop/node_modules/node-pty/prebuilds
          ls -1 | grep -v '^darwin-arm64$' | xargs -I {} rm -rf {}
          ls -1

      - name: Build & package macOS DMG
        env:
          # Developer ID Application certificate, base64-encoded .p12.
          # Exported from Keychain Access on a Mac that has the cert.
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # Notarization credentials. If set, electron-builder uploads the
          # signed .app to Apple's notary service and staples the ticket
          # before bundling the DMG. Notarization needs hardenedRuntime: true
          # which is already configured in apps/desktop/package.json.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: RB39HEKKN6
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "No MAC_CERTIFICATE secret — building unsigned"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          pnpm desktop:package:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nestbrain-macos-arm64
          path: apps/desktop/release/*.dmg
          if-no-files-found: error
          retention-days: 7

  build-win:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-win-x64-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            electron-win-x64-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package Windows installer
        run: pnpm desktop:package:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: nestbrain-windows-x64
          path: apps/desktop/release/*.exe
          if-no-files-found: error
          retention-days: 7

  upload-polar:
    name: Upload to Polar File Downloads
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    env:
      POLAR_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
      POLAR_PRODUCT_ID: b10d71de-c0fe-4544-9855-89093a15524f
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Install curl (already present on ubuntu-latest, just explicit)
        run: curl --version

      - name: Upload files to Polar
        run: |
          python3 << 'PYEOF'
          import os, sys, subprocess, requests, json

          token      = os.environ["POLAR_TOKEN"]
          product_id = os.environ["POLAR_PRODUCT_ID"]
          headers    = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          base       = "https://api.polar.sh"

          MIME = {
              ".dmg": "application/x-apple-diskimage",
              ".exe": "application/vnd.microsoft.portable-executable",
          }

          dist = "./dist"
          files = [f for f in os.listdir(dist) if any(f.endswith(e) for e in MIME)]
          if not files:
              print("No artifacts found — nothing to upload")
              sys.exit(0)

          uploaded_file_ids = []
          for filename in files:
              path = os.path.join(dist, filename)
              ext  = os.path.splitext(filename)[1]
              mime = MIME.get(ext, "application/octet-stream")
              size = os.path.getsize(path)
              print(f"\n→ {filename}  ({size/1024/1024:.1f} MB)")

              # 1a. Compute SHA256 BEFORE calling Polar — so Polar can include it
              #     in X-Amz-SignedHeaders of the presigned URL. If we add the header
              #     after the URL is generated, S3 rejects it as "not signed" (403).
              import hashlib, base64
              sha256 = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(8 * 1024 * 1024), b""):
                      sha256.update(chunk)
              checksum_b64 = base64.b64encode(sha256.digest()).decode()
              print(f"  SHA256={checksum_b64[:20]}…")

              # 1b. Initiate upload — pass checksum so Polar signs it in the presigned URL
              r = requests.post(f"{base}/v1/files", headers=headers, json={
                  "name": filename,
                  "mime_type": mime,
                  "size": size,
                  "service": "downloadable",
                  "upload": {
                      "parts": [{
                          "number": 1,
                          "chunk_start": 0,
                          "chunk_end": size - 1,
                          "checksum_sha256_base64": checksum_b64,
                      }]
                  }
              }, timeout=30)
              if not r.ok:
                  print("  initiate upload failed:", r.status_code, r.text); sys.exit(1)
              data       = r.json()
              file_id    = data["id"]                  # polar file id — used in URL
              upload_id  = data["upload"]["id"]        # S3 multipart UploadId — used in body
              file_path  = data["upload"].get("path") or data.get("path") or filename
              part       = data["upload"]["parts"][0]
              s3_url     = part["url"]
              s3_headers = part.get("headers", {})
              print(f"  file_id={file_id} upload_id={upload_id}")
              print(f"  path={file_path}")
              print(f"  signed headers: {list(s3_headers.keys())}")

              # 2. PUT to presigned S3 URL via curl
              header_args = []
              for k, v in s3_headers.items():
                  header_args += ["--header", f"{k}: {v}"]

              result = subprocess.run([
                  "curl", "--http1.1",
                  "--fail-with-body", "--silent", "--show-error",
                  "--upload-file", path,
                  "--header", "Expect:",
                  "--dump-header", "-",
                  "--max-time", "600",
                  "--retry", "3",
                  "--retry-delay", "10",
              ] + header_args + [s3_url], capture_output=True, text=True)

              if result.returncode != 0:
                  print("  S3 upload failed")
                  print("  stderr:", result.stderr[:300])
                  print("  stdout:", result.stdout[:800])
                  sys.exit(1)

              # Extract ETag from curl response headers
              etag = ""
              for line in result.stdout.splitlines():
                  if line.lower().startswith("etag:"):
                      etag = line.split(":", 1)[1].strip().strip('"')
                      break
              print(f"  S3 OK, ETag={etag}")

              # 3. Confirm upload — body 'id' MUST be the S3 multipart UploadId,
              # NOT the polar file id (Polar uses it directly as boto3 UploadId).
              confirm_body = {
                  "id": upload_id,
                  "path": file_path,
                  "parts": [{
                      "number": 1,
                      "checksum_etag": etag,
                      "checksum_sha256_base64": checksum_b64,
                  }],
              }
              r2 = requests.post(f"{base}/v1/files/{file_id}/uploaded",
                  headers=headers, json=confirm_body, timeout=30)
              if not r2.ok:
                  print("  confirm failed:", r2.status_code, r2.text[:400]); sys.exit(1)
              print("  confirmed")
              uploaded_file_ids.append(file_id)

          # 4. Attach files to the product's downloadables benefit.
          # Files are not attached directly to products — they belong to a
          # 'downloadables' benefit that the product references.
          print("\n=== Attaching files to downloadables benefit ===")
          prod = requests.get(f"{base}/v1/products/{product_id}",
              headers={"Authorization": f"Bearer {token}"}, timeout=30)
          if not prod.ok:
              print("  product fetch failed:", prod.status_code, prod.text[:300]); sys.exit(1)
          benefits = prod.json().get("benefits", [])
          downloadables = next((b for b in benefits if b.get("type") == "downloadables"), None)
          if not downloadables:
              print("  ERROR: product has no 'downloadables' benefit"); sys.exit(1)
          benefit_id = downloadables["id"]
          print(f"  benefit_id={benefit_id}")

          # Get current files + archived map (PATCH replaces the whole list)
          b = requests.get(f"{base}/v1/benefits/{benefit_id}",
              headers={"Authorization": f"Bearer {token}"}, timeout=30)
          if not b.ok:
              print("  benefit fetch failed:", b.status_code, b.text[:300]); sys.exit(1)
          props = b.json().get("properties", {})
          current_files = props.get("files", [])
          current_archived = props.get("archived", {})
          print(f"  current files: {len(current_files)}")

          # Merge: keep existing, append new ones (dedup, preserve order)
          merged = list(dict.fromkeys(current_files + uploaded_file_ids))
          print(f"  merged files: {len(merged)} (added {len(merged) - len(current_files)})")

          patch = requests.patch(f"{base}/v1/benefits/{benefit_id}",
              headers=headers,
              json={
                  "type": "downloadables",
                  "properties": {"files": merged, "archived": current_archived},
              }, timeout=30)
          if not patch.ok:
              print("  attach failed:", patch.status_code, patch.text[:400]); sys.exit(1)
          print("  attached to benefit")

          print("\nAll files uploaded and attached successfully.")
          PYEOF

  release:
    name: Publish to private releases repo
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (source repo, just for package.json)
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      # Publish the signed binaries to the PRIVATE distribution repo
      # `mikegazzaruso/nestbrain-releases`. Buyers gain repo access via Polar,
      # giving them read access to releases. The source remains public on
      # `mikegazzaruso/nestbrain`; only the official notarized builds are
      # behind the paywall here.
      - name: Create / update Release on private repo
        uses: softprops/action-gh-release@v2
        with:
          repository: mikegazzaruso/nestbrain-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: v${{ steps.version.outputs.version }}
          name: NestBrain v${{ steps.version.outputs.version }}
          body: |
            Official signed and notarized NestBrain builds for paying supporters.
            Source code and self-build instructions remain free at
            https://github.com/mikegazzaruso/nestbrain
          fail_on_unmatched_files: true
          files: |
            dist/*.dmg
            dist/*.exe
