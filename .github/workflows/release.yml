name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs of the same workflow on the same branch when a new
# commit is pushed — avoids piling up concurrent release builds.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    name: Build macOS arm64
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-arm64-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            electron-mac-arm64-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package macOS DMG
        env:
          # Developer ID Application certificate, base64-encoded .p12.
          # Exported from Keychain Access on a Mac that has the cert.
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "No MAC_CERTIFICATE secret found — building unsigned"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          pnpm desktop:package:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindnest-macos-arm64
          path: apps/desktop/release/*.dmg
          if-no-files-found: error
          retention-days: 7

  build-win:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-win-x64-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            electron-win-x64-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package Windows installer
        run: pnpm desktop:package:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindnest-windows-x64
          path: apps/desktop/release/*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MindNest v${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.dmg
            dist/*.exe
